; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

; ── Production flight firmware ─────────────────────────────────────────────
[env:teensy40]
platform = teensy
board = teensy40
framework = arduino
monitor_speed = 115200
monitor_port = COM3        ; Windows — change to your port
; monitor_port = /dev/ttyACM0  ; Linux
; monitor_port = /dev/cu.usbmodem*  ; Mac
build_flags =
    -Wall
    -Wextra
    -I include
build_src_filter = +<*> -<main.cpp>    ; exclude test harness

; ── Sensor test harness (upload this to run driver tests at the bench) ──────
[env:teensy40_test]
platform = teensy
board = teensy40
framework = arduino
monitor_speed = 115200
monitor_port = COM3
build_flags =
    -Wall
    -Wextra
    -I include
build_src_filter = +<*> -<main_control_loop.cpp>   ; exclude production loop