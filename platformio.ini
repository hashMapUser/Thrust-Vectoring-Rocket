; PlatformIO Project Configuration File
; https://docs.platformio.org/page/projectconf.html
;
; Environments:
;   flight  — production flight firmware   (pio run -e flight -t upload)
;   bench   — hardware bench test harness  (pio run -e bench  -t upload)

[common]
platform      = teensy
board         = teensy40
framework     = arduino
monitor_speed = 115200
monitor_port  = COM3        ; Windows — change to your port
; monitor_port = /dev/ttyACM0       ; Linux
; monitor_port = /dev/cu.usbmodem*  ; Mac
build_flags =
    -Wall
    -Wextra
    -I include

; ── Production flight firmware ─────────────────────────────────────────────
[env:flight]
extends = common
build_src_filter = +<*> -<main.cpp> -<bench_test.cpp>

; ── Hardware bench test harness ────────────────────────────────────────────
[env:bench]
extends = common
build_src_filter = +<*> -<main.cpp> -<main_control_loop.cpp>
